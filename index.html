<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>两口子的饭桌 · Demo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="dishes-data.js"></script>
<style>
  :root{
    --bg:#faf7f2; --card:#ffffff; --ink:#3d3229; --muted:#9a8f82;
    --accent:#e8734a; --accent-soft:#fdeee7; --green:#4a9d6b; --green-soft:#e7f5ec;
    --amber:#d99a2b; --amber-soft:#faf3e0; --line:#eee7dd; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang SC","Hiragino Sans","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);padding-bottom:90px}
  header{padding:16px 16px 12px;text-align:center;position:relative}
  header h1{font-size:20px;letter-spacing:1px}
  header p{font-size:12px;color:var(--muted);margin-top:4px}
  .lang-btn{position:absolute;right:14px;top:14px;border:1px solid var(--line);background:var(--card);border-radius:16px;padding:5px 12px;font-size:12px;cursor:pointer}
  .reset-btn{position:absolute;left:14px;top:14px;border:1px solid var(--line);background:var(--card);border-radius:16px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted)}
  .userbar{display:flex;justify-content:center;gap:8px;margin-top:10px}
  .userbar button{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:6px 16px;font-size:13px;cursor:pointer}
  .userbar button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .sync-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
  main{max-width:520px;margin:0 auto;padding:0 14px}
  .tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--card);border-top:1px solid var(--line);z-index:10}
  .tabs button{flex:1;padding:10px 2px 14px;border:none;background:none;font-size:11px;color:var(--muted);cursor:pointer;line-height:1.3}
  .tabs button .ico{display:block;font-size:20px;margin-bottom:2px}
  .tabs button.active{color:var(--accent);font-weight:600}
  .page{display:none;animation:fade .2s}
  .page.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .card h3{font-size:14px;margin-bottom:10px}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--accent-soft);color:var(--accent);margin-right:4px}
  .tag.green{background:var(--green-soft);color:var(--green)}
  .tag.amber{background:var(--amber-soft);color:var(--amber)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px dashed var(--line)}
  .row:last-child{border-bottom:none}
  select,input[type=text],input[type=number]{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;background:#fff;color:var(--ink)}
  .btn{border:none;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;background:var(--accent);color:#fff}
  .btn.ghost{background:var(--accent-soft);color:var(--accent)}
  .btn.small{padding:4px 10px;font-size:12px}
  .stars{cursor:pointer;user-select:none;letter-spacing:2px}
  .stars .off{opacity:.25}
  .meal-slot{background:var(--bg);border-radius:10px;padding:8px 10px;margin-bottom:6px}
  .meal-slot .slot-title{font-size:12px;color:var(--muted);margin-bottom:4px}
  .dish-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:3px 10px;font-size:12px;margin:2px 4px 2px 0}
  .dish-chip .rm{cursor:pointer;color:var(--muted)}
  .dish-chip.ready{border-color:var(--green);background:var(--green-soft)}
  .daynav{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px}
  .daynav button{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:6px 12px;font-size:12px;cursor:pointer}
  .daynav button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .check{width:20px;height:20px;border:2px solid var(--line);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:#fff;flex-shrink:0}
  .check.on{background:var(--green);border-color:var(--green)}
  .strike{text-decoration:line-through;color:var(--muted)}
  .muted{color:var(--muted);font-size:12px}
  .flex{display:flex;gap:8px;align-items:center}
  .grow{flex:1}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:24px 0}
  .cuisine-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .cuisine-filter button{border:1px solid var(--line);background:var(--card);border-radius:14px;padding:4px 12px;font-size:12px;cursor:pointer}
  .cuisine-filter button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .badge-missing{font-size:11px;color:var(--amber)}
  .photo-hint{border:2px dashed var(--line);border-radius:10px;padding:14px;text-align:center;color:var(--muted);font-size:12px;margin-bottom:10px;cursor:pointer}
  .detail-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:50;overflow-y:auto;padding:14px;animation:fade .2s}
  .detail-overlay.open{display:block}
  .detail-inner{max-width:520px;margin:0 auto;padding-bottom:40px}
  .detail-back{border:1px solid var(--line);background:var(--card);border-radius:16px;padding:6px 14px;font-size:13px;cursor:pointer;margin-bottom:12px}
  .detail-head{text-align:center;margin-bottom:14px}
  .detail-head .big{font-size:44px}
  .detail-head h2{font-size:20px;margin-top:4px}
  .steps-ol{padding-left:6px;counter-reset:step}
  .steps-ol li{list-style:none;display:flex;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px;line-height:1.6}
  .steps-ol li:last-child{border-bottom:none}
  .steps-ol li::before{counter-increment:step;content:counter(step);flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-top:2px}
  .ref-link{display:inline-block;font-size:12px;color:var(--accent);text-decoration:none;border:1px solid var(--accent-soft);background:var(--accent-soft);border-radius:14px;padding:5px 12px;margin:4px 6px 0 0}
  .clickable{cursor:pointer}
  .hidden{display:none !important}
  .tag.blue{background:#eaf2ff;color:#3a8dff}
  .modewrap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;display:flex;gap:4px;margin-bottom:8px}
  .modeopt{flex:1;text-align:center;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
  .modeopt.on{background:var(--accent);color:#fff}
  .modeopt small{display:block;font-weight:400;font-size:10px;margin-top:2px;opacity:.85}
  .modehint{font-size:12px;border-radius:10px;padding:9px 11px;margin-bottom:12px;line-height:1.5}
  .modehint.merge{background:var(--green-soft);color:var(--green)}
  .modehint.over{background:var(--amber-soft);color:var(--amber)}
  .stepper{display:flex;align-items:center;background:var(--bg);border-radius:9px;overflow:hidden;flex-shrink:0}
  .stepper button{width:28px;height:28px;border:none;background:transparent;font-size:16px;color:var(--accent);cursor:pointer;font-weight:600}
  .stepper span{min-width:26px;text-align:center;font-size:13px;font-weight:600}
  .scan-item{opacity:1;transition:opacity .2s}
  .scan-item.removed{opacity:.35}
  .scan-item.review{outline:1.5px solid var(--amber);outline-offset:-1.5px;border-radius:10px}
  .scan-warn{color:#c0392b;font-size:12px;margin-top:6px;background:#fdecea;padding:8px 10px;border-radius:8px}
  .scanline-log{font-size:13px;color:var(--ink);padding:3px 0}
  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:99}
  .toast.show{opacity:1}
  .toast.sync{background:var(--green)}
</style>
</head>
<body>

<header>
  <button class="reset-btn" id="btn-reset" onclick="resetDemo()"></button>
  <button class="lang-btn" onclick="toggleLang()" id="btn-lang">🇯🇵 日本語</button>
  <h1 id="h-title"></h1>
  <p id="h-sub"></p>
  <div class="userbar">
    <button id="u-me" class="active" onclick="switchUser('me')"></button>
    <button id="u-partner" onclick="switchUser('partner')"></button>
  </div>
  <p class="sync-hint clickable" id="h-sync" onclick="openPairing()"></p>
</header>

<main>
  <div id="page-plan" class="page active"></div>
  <div id="page-dishes" class="page"></div>
  <div id="page-fridge" class="page"></div>
  <div id="page-shopping" class="page"></div>
  <div id="page-suggest" class="page"></div>
</main>

<nav class="tabs">
  <button id="tab-plan" class="active" onclick="switchTab('plan')"><span class="ico">📅</span><span class="lbl"></span></button>
  <button id="tab-suggest" onclick="switchTab('suggest')"><span class="ico">💡</span><span class="lbl"></span></button>
  <button id="tab-shopping" onclick="switchTab('shopping')"><span class="ico">🛒</span><span class="lbl"></span></button>
  <button id="tab-fridge" onclick="switchTab('fridge')"><span class="ico">🧊</span><span class="lbl"></span></button>
  <button id="tab-dishes" onclick="switchTab('dishes')"><span class="ico">📖</span><span class="lbl"></span></button>
</nav>

<div id="detail" class="detail-overlay"></div>
<div id="adddish" class="detail-overlay"></div>
<div id="pairing" class="detail-overlay"></div>
<div id="scan" class="detail-overlay"></div>
<div id="picker" class="detail-overlay"></div>
<div id="toast" class="toast"></div>

<script>
/* ================= CORE LOGIC START ================= */

// ---- 菜谱库（中/日/韩/西）；name为内部主键，ja为日语显示名 ----
const DISHES = [
  // ---- 中餐 ----
  {id:'d1', name:'番茄炒蛋', ja:'トマトと卵の炒め物', cuisine:'中餐', emoji:'🍅', ingredients:[{n:'番茄',q:2,u:'个'},{n:'鸡蛋',q:3,u:'个'},{n:'葱',q:1,u:'根'}],
    steps:['鸡蛋加少许盐打散，番茄切滚刀块','热油滑炒鸡蛋至刚凝固，盛出','余油炒番茄至出汁，加糖和盐调味','倒回鸡蛋翻匀，撒葱花出锅'],
    stepsJa:['卵は塩少々を加えて溶き、トマトは乱切りにする','熱した油で卵を半熟に炒めて一度取り出す','トマトを炒めて汁気を出し、砂糖と塩で調味','卵を戻してさっと混ぜ、ねぎを散らす']},
  {id:'d2', name:'麻婆豆腐', ja:'麻婆豆腐', cuisine:'中餐', emoji:'🌶️', ingredients:[{n:'豆腐',q:1,u:'块'},{n:'猪肉末',q:150,u:'g'},{n:'豆瓣酱',q:1,u:'勺'},{n:'葱',q:1,u:'根'}],
    steps:['豆腐切块，淡盐水焯1分钟捞出','炒肉末至变色，下豆瓣酱炒出红油','加水和豆腐，中火煮3分钟','水淀粉勾芡，撒葱花和花椒粉'],
    stepsJa:['豆腐は角切りにして塩水で1分下茹でする','ひき肉を炒め、豆板醤を加えて香りを出す','水と豆腐を加えて中火で3分煮る','水溶き片栗粉でとろみをつけ、ねぎと花椒をふる']},
  {id:'d3', name:'清蒸鲈鱼', ja:'スズキの姿蒸し', cuisine:'中餐', emoji:'🐟', ingredients:[{n:'鲈鱼',q:1,u:'条'},{n:'姜',q:1,u:'块'},{n:'葱',q:2,u:'根'},{n:'蒸鱼豉油',q:2,u:'勺'}],
    steps:['鱼身两面划刀，铺姜片葱段','水开后上锅大火蒸8分钟','倒掉蒸汁，换新葱丝，淋蒸鱼豉油','浇一勺冒烟热油激出香味'],
    stepsJa:['魚の両面に切り込みを入れ、生姜とねぎをのせる','沸騰した蒸し器で強火8分蒸す','蒸し汁を捨て、新しいねぎに替えて醤油だれをかける','煙が出るほど熱した油をかけて香りを立たせる']},
  {id:'d4', name:'皮蛋瘦肉粥', ja:'ピータン粥', cuisine:'中餐', emoji:'🥣', ingredients:[{n:'大米',q:1,u:'杯'},{n:'皮蛋',q:2,u:'个'},{n:'猪里脊',q:100,u:'g'},{n:'姜',q:1,u:'块'}],
    steps:['大米加少许油盐拌匀腌20分钟','水开下米，中火煮30分钟至米粒开花','下腌好的肉丝、皮蛋丁和姜丝煮5分钟','调味后撒葱花与白胡椒'],
    stepsJa:['米に油と塩少々をまぶして20分置く','沸騰した湯に米を入れ、中火で30分煮る','下味した豚肉・ピータン・生姜を加えて5分','塩で味を調え、ねぎと白こしょうをふる']},
  {id:'d13', name:'红烧肉', ja:'紅焼肉（豚バラの甘辛煮込み）', cuisine:'中餐', emoji:'🥩', ingredients:[{n:'五花肉',q:500,u:'g'},{n:'冰糖',q:30,u:'g'},{n:'酱油',q:3,u:'勺'},{n:'料酒',q:2,u:'勺'},{n:'姜',q:1,u:'块'}],
    steps:['五花肉切块，冷水下锅焯水','小火炒冰糖至琥珀色，下肉块裹上糖色','加料酒、酱油、姜和热水没过肉','小火炖1小时后大火收汁'],
    stepsJa:['豚バラ肉を角切りにし、水から下茹でする','氷砂糖を弱火で溶かしカラメル色にし、肉に絡める','料理酒・醤油・生姜・熱湯をひたひたに加える','弱火で1時間煮て、最後に強火で煮詰める']},
  {id:'d14', name:'宫保鸡丁', ja:'宮保鶏丁（鶏とピーナッツの炒め）', cuisine:'中餐', emoji:'🥜', ingredients:[{n:'鸡胸肉',q:300,u:'g'},{n:'花生米',q:50,u:'g'},{n:'干辣椒',q:8,u:'个'},{n:'葱',q:2,u:'根'},{n:'醋',q:2,u:'勺'},{n:'糖',q:1,u:'勺'}],
    steps:['鸡肉切丁腌10分钟，花生米炸脆备用','糖、醋、酱油调成碗汁','爆香干辣椒，下鸡丁大火炒至变色','倒碗汁，加花生和葱段翻匀'],
    stepsJa:['鶏肉は角切りにして下味10分、ピーナッツは揚げる','砂糖・酢・醤油を合わせてタレを作る','乾燥唐辛子を炒め、鶏肉を強火で炒める','タレを回し入れ、ピーナッツとねぎを絡める']},
  {id:'d15', name:'鱼香肉丝', ja:'魚香肉絲（細切り肉の甘酢炒め）', cuisine:'中餐', emoji:'🫙', ingredients:[{n:'猪里脊',q:200,u:'g'},{n:'木耳',q:50,u:'g'},{n:'胡萝卜',q:0.5,u:'根'},{n:'青椒',q:1,u:'个'},{n:'豆瓣酱',q:1,u:'勺'},{n:'醋',q:2,u:'勺'}],
    steps:['肉切丝上浆，木耳胡萝卜青椒切丝','糖、醋、酱油、淀粉调鱼香汁','滑炒肉丝盛出，下豆瓣酱炒香','下配菜回肉丝，倒汁大火翻匀'],
    stepsJa:['豚肉は細切りにして下味、野菜も細切りにする','砂糖・酢・醤油・片栗粉で合わせダレを作る','肉を炒めて取り出し、豆板醤を炒めて香りを出す','野菜と肉を合わせ、タレを入れて強火で絡める']},
  {id:'d16', name:'青椒土豆丝', ja:'じゃがいもとピーマンの細切り炒め', cuisine:'中餐', emoji:'🥔', ingredients:[{n:'土豆',q:2,u:'个'},{n:'青椒',q:1,u:'个'},{n:'干辣椒',q:3,u:'个'},{n:'醋',q:1,u:'勺'}],
    steps:['土豆切细丝，清水泡去淀粉','热油爆香干辣椒','大火快炒土豆丝2分钟保持脆感','加青椒丝、醋和盐翻匀出锅'],
    stepsJa:['じゃがいもは細切りにして水にさらす','熱した油で乾燥唐辛子を炒める','じゃがいもを強火で2分、シャキッと炒める','ピーマン・酢・塩を加えてさっと混ぜる']},
  {id:'d17', name:'可乐鸡翅', ja:'手羽先のコーラ煮', cuisine:'中餐', emoji:'🍗', ingredients:[{n:'鸡翅',q:8,u:'个'},{n:'可乐',q:330,u:'ml'},{n:'姜',q:1,u:'块'},{n:'酱油',q:2,u:'勺'}],
    steps:['鸡翅两面划刀，焯水去腥','少油煎至两面金黄','倒入可乐、酱油和姜片','中火煮15分钟收汁至浓稠'],
    stepsJa:['手羽先に切り込みを入れ、下茹でする','少量の油で両面をこんがり焼く','コーラ・醤油・生姜を加える','中火で15分、照りが出るまで煮詰める']},
  // ---- 日餐 ----
  {id:'d5', name:'亲子丼', ja:'親子丼', cuisine:'日餐', emoji:'🍗', ingredients:[{n:'鸡腿肉',q:200,u:'g'},{n:'鸡蛋',q:2,u:'个'},{n:'洋葱',q:1,u:'个'},{n:'大米',q:1,u:'杯'},{n:'味淋',q:2,u:'勺'}],
    steps:['洋葱切丝，鸡腿肉切一口大小','锅中加味淋、酱油和水，煮洋葱和鸡肉至熟','淋入蛋液，半熟时关火加盖焖30秒','连汁盖在热米饭上'],
    stepsJa:['玉ねぎは薄切り、鶏もも肉は一口大に切る','みりん・醤油・水で玉ねぎと鶏肉を煮る','溶き卵を回し入れ、半熟で火を止め30秒蒸らす','煮汁ごと熱いご飯にのせる']},
  {id:'d6', name:'日式咖喱饭', ja:'カレーライス', cuisine:'日餐', emoji:'🍛', ingredients:[{n:'咖喱块',q:4,u:'块'},{n:'土豆',q:2,u:'个'},{n:'胡萝卜',q:1,u:'根'},{n:'洋葱',q:1,u:'个'},{n:'鸡腿肉',q:250,u:'g'},{n:'大米',q:2,u:'杯'}],
    steps:['鸡肉和蔬菜切块，炒至洋葱透明','加水没过食材，煮15分钟','关火放咖喱块搅至溶化，再小火煮5分钟','浇在米饭上'],
    stepsJa:['鶏肉と野菜を切り、玉ねぎが透明になるまで炒める','水をひたひたに加えて15分煮る','火を止めてルーを溶かし、弱火でさらに5分','ご飯にかける']},
  {id:'d7', name:'味噌汤', ja:'味噌汁', cuisine:'日餐', emoji:'🍜', ingredients:[{n:'味噌',q:2,u:'勺'},{n:'豆腐',q:0.5,u:'块'},{n:'裙带菜',q:5,u:'g'}],

// ---- 周日期辅助 ----
function pad2(n){return String(n).padStart(2,'0');}
function isoOf(dt){return dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());}
function mondayISO(d){
  const dt=d?new Date(d+'T00:00:00'):new Date();
  dt.setDate(dt.getDate()-((dt.getDay()+6)%7));
  return isoOf(dt);
}
function addDaysISO(iso,n){const dt=new Date(iso+'T00:00:00');dt.setDate(dt.getDate()+n);return isoOf(dt);}
function fmtMD(iso){const p=iso.split('-');return Number(p[1])+'/'+Number(p[2]);}
function emptyWeek(){const p={};DAYS.forEach(d=>p[d]={'早餐':[],'午餐':[],'晚餐':[]});return p;}
function getWeekPlan(w){if(!state.planWeeks[w])state.planWeeks[w]=emptyWeek();return state.planWeeks[w];}
function currentWeekPlan(){return getWeekPlan(mondayISO());}
function viewedPlan(){return getWeekPlan(state.viewWeek);}

// ---- 菜谱文本解析器 v2（面向真实粘贴场景：下厨房/Cookpad/博客等） ----
const CN_NUM={'一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'半':0.5};
function parseQty(sq){
  sq=String(sq).trim();
  if(CN_NUM[sq]!=null) return CN_NUM[sq];
  if(sq.includes('/')){const[a,b]=sq.split('/');const v=parseFloat(a)/parseFloat(b);return isNaN(v)?1:v;}
  const v=parseFloat(sq); return isNaN(v)?1:v;
}
const UNIT_LIST=['千克','公斤','毫升','大さじ','小さじ','大匙','小匙','茶匙','汤匙','カップ','パック','切れ','かけ','tbsp','tsp','cup','克','个','個','根','块','勺','杯','条','片','枚','罐','缶','瓣','张','颗','只','本','把','袋','包','盒','瓶','株','束','丁','尾','匹','玉','合','斤','两','磅','滴','kg','ml','cc','g','l','L'];
const UNIT_RE=UNIT_LIST.map(u=>u.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
const QTY_RE='[\\d一二两三四五六七八九十半]+(?:[\\.\\/][\\d]+)?';
const APPROX_RE='(适量|少许|少量|少々|適量|お好みで|ひとつまみ|一つまみ|按需|随意|依个人口味)';
function normUnit(u){
  const m={'克':'g','千克':'kg','公斤':'kg','毫升':'ml','cc':'ml','L':'l','大匙':'勺','小匙':'勺','大さじ':'勺','小さじ':'勺','茶匙':'勺','汤匙':'勺','tbsp':'勺','tsp':'勺','個':'个','枚':'片','本':'根','缶':'罐','カップ':'杯','cup':'杯','玉':'个','切れ':'块','かけ':'瓣','パック':'包'};
  return m[u]||u;
}
// 全角→半角等归一
function normRecipeText(str){
  return String(str||'')
    .replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/：/g,':').replace(/．/g,'.').replace(/（/g,'(').replace(/）/g,')');
}
// 解析单个食材候选片段；inIngSection=true时接受纯名称
function parseIngItem(raw,inIngSection){
  let t=String(raw).trim()
    .replace(/^[-*・•●○◎▪‣＊※>＞\s]+/,'')
    .replace(/…+|·{2,}|\.{3,}/g,' ')
    .replace(/\((?:约|大约|目安)?\)/g,'')
    .replace(/\s+/g,' ').trim();
  if(!t||t.length>40)return null;
  let m;
  // 「醤油 大さじ2」型：量词在数字前
  m=t.match(new RegExp('^(.{1,20}?)[\\s:]*[(]?(大さじ|小さじ|大匙|小匙|汤匙|茶匙)\\s*('+QTY_RE+')[)]?$'));
  if(m&&m[1].trim())return {n:m[1].trim(),q:parseQty(m[3]),u:'勺'};
  // 「鸡蛋 3个」「鸡蛋3」「卵 2個」型（单位可省略）
  m=t.match(new RegExp('^(.{1,20}?)[\\s:]*('+QTY_RE+')\\s*('+UNIT_RE+')?\\s*(?:左右|くらい|ほど|程度)?$'));
  if(m&&m[1].trim()&&!/^\d+$/.test(m[1].trim()))return {n:m[1].trim(),q:parseQty(m[2]),u:normUnit(m[3]||'份')};
  // 「2个鸡蛋」「300g牛肉」型：数量在前
  m=t.match(new RegExp('^('+QTY_RE+')\\s*('+UNIT_RE+')\\s*(?:的)?([^\\d]{1,20}?)$'));
  if(m&&m[3].trim())return {n:m[3].trim(),q:parseQty(m[1]),u:normUnit(m[2])};
  // 「盐 适量」型
  m=t.match(new RegExp('^(.{1,20}?)[\\s:]*[(]?'+APPROX_RE+'[)]?$'));
  if(m&&m[1].trim())return {n:m[1].trim(),q:1,u:'份'};
  // 明确的食材区内：纯名称也接受（用户只列了名字）
  if(inIngSection&&/^[^\d]{1,15}$/.test(t)&&!/[。.!?！？]/.test(t))return {n:t,q:1,u:'份'};
  return null;
}
function parseRecipeText(text){
  const lines=normRecipeText(text).split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  const ings=[],steps=[],unparsed=[];
  let mode='auto';
  const ingHeader=/^[【\[(]?\s*(用料|食材|材料|配料|主料|辅料|调料|調味料|ingredients?)\s*[】\])]?\s*(\(.{0,12}\))?\s*:?\s*/i;
  const stepHeader=/^[【\[(]?\s*(做法|步骤|烹饪步骤|制作方法|制作步骤|作り方|手順|instructions?|directions?|steps?)\s*[】\])]?\s*:?\s*/i;
  const splitRe=/[、，,;；]|\s{2,}|\t/;
  for(const line0 of lines){
    let line=line0;
    if(stepHeader.test(line)){
      mode='step';
      const rest=line.replace(stepHeader,'').trim();
      if(rest.length>3)steps.push(rest);
      continue;
    }
    const ih=line.match(ingHeader);
    if(ih){mode='ing';line=line.replace(ingHeader,'').trim();if(!line)continue;}
    const numbered=line.match(/^(?:第?\s*\d+\s*[.、步）)]|[①②③④⑤⑥⑦⑧⑨⑩⑪⑫]|step\s*\d+[:.]?)\s*(.+)/i);
    if(mode==='ing'){
      const stripped=(numbered?numbered[1]:line).trim();
      stripped.split(splitRe).map(x=>x.trim()).filter(Boolean).forEach(p=>{
        const it=parseIngItem(p,true);
        if(it)ings.push(it);else unparsed.push(p);
      });
      continue;
    }
    if(numbered){steps.push(numbered[1].trim());mode='step';continue;}
    if(mode==='step'){if(line.length>3)steps.push(line);else unparsed.push(line);continue;}
    // auto模式：整行是食材列表 or 步骤
    const parts=line.split(splitRe).map(x=>x.trim()).filter(Boolean);
    const items=parts.map(p=>parseIngItem(p,false));
    const okCnt=items.filter(Boolean).length;
    if(okCnt&&okCnt*2>=parts.length){
      items.forEach((it,i)=>{if(it)ings.push(it);else unparsed.push(parts[i]);});
      continue;
    }
    if(line.length>=10){steps.push(line);continue;}
    unparsed.push(line);
  }
  // 同名同单位合并
  const merged=[];
  ings.forEach(i=>{
    const ex=merged.find(x=>x.n===i.n&&x.u===i.u);
    if(ex)ex.q+=i.q;else merged.push(i);
  });
  return {ings:merged,steps,unparsed};
}

// ---- 核心计算（评分/需求/购物清单/推荐） ----
function avgRating(id){
  const a=state.ratings.me[id], b=state.ratings.partner[id];
  const vals=[a,b].filter(v=>v!=null);
  return vals.length? vals.reduce((s,v)=>s+v,0)/vals.length : 0;
}

function requiredIngredients(plan){
  const need={};
  Object.values(plan).forEach(day=>Object.values(day).forEach(ids=>ids.forEach(id=>{
    const dish=getDish(id); if(!dish) return;
    dish.ingredients.forEach(i=>{
      if(!need[i.n]) need[i.n]={n:i.n,q:0,u:i.u};
      need[i.n].q+=i.q;
    });
  })));
  return need;
}

function fridgeMap(fridge){
  const m={}; fridge.forEach(i=>{ m[i.n]=(m[i.n]||0)+i.q; }); return m;
}

function shoppingList(plan,fridge,purchased){
  const need=requiredIngredients(plan), stock=fridgeMap(fridge), out=[];
  Object.values(need).forEach(item=>{
    const have=stock[item.n]||0;
    const shortage=item.q-have;
    if(shortage>1e-9) out.push({n:item.n,q:Math.ceil(shortage*100)/100,u:item.u,done:!!purchased[item.n]});
  });
  return out.sort((a,b)=> (a.done-b.done) || a.n.localeCompare(b.n,'zh'));
}

function missingFor(dish,fridge,purchased){
  const stock=fridgeMap(fridge);
  return dish.ingredients.filter(i=>{
    if(purchased && purchased[i.n]) return false;
    return (stock[i.n]||0) < i.q - 1e-9;
  });
}

function isReadyToCook(dish,fridge,purchased){
  return missingFor(dish,fridge,purchased).length===0;
}

function recommend(fridge,purchased){
  return allDishes().map(d=>({dish:d,missing:missingFor(d,fridge,purchased),rating:avgRating(d.id)}))
    .sort((a,b)=> (a.missing.length-b.missing.length) || (b.rating-a.rating));
}

const LS_KEY='mp_state_v2', LS_PREFS='mp_prefs_v2';
let syncChannel=null;
state.ver=0; // 版本号：跨设备合并时新者胜

function snapshot(){const s={ver:state.ver};SYNC_KEYS.forEach(k=>s[k]=state[k]);return s;}

function saveState(){
  try{
    if(!CLOUD_ON) localStorage.setItem(LS_KEY,JSON.stringify(snapshot()));
    localStorage.setItem(LS_PREFS,JSON.stringify({lang:state.lang,user:state.user,market:state.market||null,buyPlatform:state.buyPlatform||null}));
  }catch(e){}
}
function loadState(){
  try{
    if(!CLOUD_ON){
      const raw=localStorage.getItem(LS_KEY);
      if(raw){
        const s=JSON.parse(raw);
        SYNC_KEYS.forEach(k=>{if(s[k]!=null)state[k]=s[k];});
        if(s.plan&&!s.planWeeks){state.planWeeks={};state.planWeeks[mondayISO()]=s.plan;} // 旧版数据迁移
        if(s.ver)state.ver=s.ver;
      }
    }
    const p=localStorage.getItem(LS_PREFS);
    if(p){const q=JSON.parse(p);if(q.lang)state.lang=q.lang;if(q.user)state.user=q.user;
      if(q.market)state.market=q.market;if(q.buyPlatform)state.buyPlatform=q.buyPlatform;}
  }catch(e){}
}
function applyRemote(data){
  if(!data)return;
  SYNC_KEYS.forEach(k=>{if(data[k]!=null)state[k]=data[k];});
  if(data.ver!=null&&data.ver>state.ver)state.ver=data.ver;
  renderAll();
  toast(tr('synced'),true);
}
function initSync(){
  try{
    syncChannel=new BroadcastChannel('mp_sync_v2');
    syncChannel.onmessage=e=>applyRemote(e.data);
  }catch(e){/* 旧浏览器降级：仅storage事件 */}
  if(typeof window!=='undefined'&&window.addEventListener){
    window.addEventListener('storage',e=>{
      if(e.key===LS_KEY&&e.newValue){try{applyRemote(JSON.parse(e.newValue));}catch(_){}}
    });
  }
}
// 每次数据变更：保存 + 同窗口广播 + 跨设备发送 + 重绘
function commit(){
  if(CLOUD_ON){renderAll();return;}
  state.ver++;
  saveState();
  if(syncChannel){try{syncChannel.postMessage(snapshot());}catch(e){}}
  renderAll();
}

function cloudClient(){
  if(cloud.sb)return cloud.sb;

function checkAuthUrlError(){
  if(typeof location==='undefined')return null;
  try{
    const frag=(location.hash||'')+'&'+(location.search||'');
    const m=frag.match(/error_code=([^&]+)/), d=frag.match(/error_description=([^&]+)/);
    if(!m&&!d)return null;
    const code=m?decodeURIComponent(m[1]):'';
    if(/otp_expired|access_denied/.test(code))return tr('authLinkExpired');
    return T[state.lang].authLinkErr(decodeURIComponent((d&&d[1]||code).replace(/\+/g,' ')));
  }catch(e){return null;}
}
async function initCloud(){
  if(!cloud.on)return;
  const sb=cloudClient();
  if(!sb){cloud.on=false;renderAll();return;}
  cloud.urlError=checkAuthUrlError();
  const {data}=await sb.auth.getSession();
  cloud.session=data&&data.session||null;
  cloud.myUid=cloud.session?cloud.session.user.id:null;
  sb.auth.onAuthStateChange((_e,sess)=>{
    const had=!!cloud.session;
    cloud.session=sess;cloud.myUid=sess?sess.user.id:null;
    if(!!sess!==had)afterAuth();
  });
  afterAuth();
}
async function afterAuth(){
  if(!cloud.session){cloud.ready=false;renderHeader();openPairing();return;}
  const sb=cloudClient();
  const {data}=await sb.rpc('my_household');
  const row=Array.isArray(data)?data[0]:data;
  if(!row){cloud.hid=null;renderHeader();openPairing();return;}
  cloud.hid=row.household_id;cloud.invite=row.invite_code;cloud.members=Number(row.member_count)||1;
  cloud.hhName=row.name||null;
  await cloudLoadAll();
  cloudSubscribe();
  startHeartbeat();
  cloud.ready=true;
  // 默认昵称=邮箱前缀
  const me=myRow();
  if(me&&!me.display_name){
    const nick=String(cloud.session.user.email).split('@')[0].slice(0,20);
    try{await cloudClient().from('household_members').update({display_name:nick}).match({household_id:cloud.hid,user_id:cloud.myUid});me.display_name=nick;}catch(e){}
  }

function applyCloudTables(t){
  if(t.fridge)state.fridge=t.fridge.map(x=>({_id:x.id,n:x.n,q:Number(x.q),u:x.u}));
  if(t.plan){
    const pw={};
    t.plan.forEach(x=>{
      const w=x.week_start||mondayISO();
      if(!pw[w])pw[w]=emptyWeek();
      if(pw[w][x.day]&&pw[w][x.day][x.meal]&&!pw[w][x.day][x.meal].includes(x.dish_id))pw[w][x.day][x.meal].push(x.dish_id);
    });
    state.planWeeks=pw;
  }
  if(t.members){cloud.memberRows=t.members;cloud.members=t.members.length;}
  if(t.purchased){state.purchased={};t.purchased.forEach(x=>state.purchased[x.name]=true);}
  if(t.ratings){
    state.ratings={me:{},partner:{}};
    t.ratings.forEach(x=>{state.ratings[x.user_id===cloud.myUid?'me':'partner'][x.dish_id]=x.rating;});

async function cloudLoadAll(){

  ]);

let refetchTimer=null;
function cloudSubscribe(){
  const sb=cloudClient();
  const ch=sb.channel('hh-'+cloud.hid);
  ['fridge_items','plan_entries','purchased_items','ratings','custom_dishes','household_members'].forEach(tb=>{

  });},
  stock(ch){cdb(async sb=>{

  });},
  clearAll(){cdb(async sb=>{

      await sb.from(tb).delete().eq('household_id',cloud.hid);
  });},
};

function relTime(ts){
  if(!ts)return null;
  const diff=Date.now()-new Date(ts).getTime();
  const m=Math.floor(diff/60000);
  if(m<2)return tr('justNow');
  if(m<60)return T[state.lang].minsAgo(m);
  const h=Math.floor(m/60);
  if(h<24)return T[state.lang].hoursAgo(h);
  return T[state.lang].daysAgo(Math.floor(h/24));
}

function renderPlan(){
  const day=state.activeDay;
  const cur=mondayISO();
  const isCur=state.viewWeek===cur, isPast=state.viewWeek<cur;
  const range=fmtMD(state.viewWeek)+' - '+fmtMD(addDaysISO(state.viewWeek,6));
  let html=`<div class="card" style="padding:8px 12px"><div class="flex" style="justify-content:space-between">
    <button class="btn ghost small" onclick="shiftWeek(-1)">‹ ${tr('weekPrev')}</button>

      ${isCur?`<span class="tag green">${tr('weekThis')}</span>`:isPast?`<span class="tag amber">${tr('weekPast')}</span>`:`<span class="tag">${tr('weekFuture')}</span>`}</span>
    <button class="btn ghost small" onclick="shiftWeek(1)">${tr('weekNext')} ›</button></div>
    ${!isCur?`<div style="text-align:center;margin-top:6px"><button class="btn small" onclick="goThisWeek()">${tr('weekBackTo')}</button></div>`:''}</div>`;
  html+=`<div class="daynav">${DAYS.map((d,i)=>`<button class="${d===day?'active':''}" onclick="setDay('${d}')">${dayName(d)}<br><span style="font-size:10px;opacity:.7">${fmtMD(addDaysISO(state.viewWeek,i))}</span></button>`).join('')}</div>`;
  html+=`<div class="card"><h3>${dayName(day)}${tr('mealsOf')}</h3>`;
  const plan=viewedPlan();
  MEALS.forEach(meal=>{
    const ids=plan[day][meal];
    html+=`<div class="meal-slot"><div class="slot-title">${meal==='早餐'?'🌅':meal==='午餐'?'☀️':'🌙'} ${mealName(meal)}</div>`;
    ids.forEach(id=>{
      const d=getDish(id);
      const ready=isReadyToCook(d,state.fridge,state.purchased);
      html+=`<span class="dish-chip ${ready?'ready':''}">${d.emoji} ${dishName(d)}${ready?' ✅':''}<span class="rm" onclick="removeDish('${day}','${meal}','${id}')">✕</span></span>`;
    });
    html+=`<div style="margin-top:6px">
      <button class="btn ghost small" style="width:100%" onclick="openPicker('${day}','${meal}')">＋ ${tr('pickDish')}</button></div></div>`;
  });
  html+=`<p class="muted" style="margin-top:8px">${tr('readyNote')}</p></div>`;

  html+=`<div class="card"><h3>${tr('weekOverview')}</h3>`;
  DAYS.forEach(d=>{
    const all=MEALS.flatMap(m=>plan[d][m]);
    if(all.length){
      html+=`<div class="row"><span style="font-size:13px;font-weight:600">${dayName(d)}</span><span style="font-size:12px;text-align:right">${all.map(id=>getDish(id).emoji+dishName(getDish(id))).join('、')}</span></div>`;
    }
  });

  $('page-plan').innerHTML=html;
}
function setDay(d){state.activeDay=d;renderPlan();}
function shiftWeek(n){state.viewWeek=addDaysISO(state.viewWeek,n*7);renderPlan();}
function goThisWeek(){state.viewWeek=mondayISO();renderPlan();}
function addDish(day,meal,explicitId){
  const el=explicitId?null:$('sel-'+meal);
  const id=explicitId||(el&&el.value);
  if(!id)return;
  const plan=viewedPlan();
  if(plan[day][meal].includes(id)){toast(tr('dupDish'));return;}
  plan[day][meal].push(id);
  if(cloud.on)db.planAdd(state.viewWeek,day,meal,id);
  commit(); toast(tr('added'));
}
function removeDish(day,meal,id){
  const plan=viewedPlan();
  plan[day][meal]=plan[day][meal].filter(x=>x!==id);
  if(cloud.on)db.planDel(state.viewWeek,day,meal,id);
  commit();
}

function addFridge(){

// -- 联盟深链（CPS变现：清单项→电商平台） --
const BUY_PLATFORMS={
  cn:[
    {id:'taobao', name:'淘宝',   tmpl:'https://s.taobao.com/search?q={kw}'},
    {id:'jd',     name:'京东',   tmpl:'https://search.jd.com/Search?keyword={kw}'},
    {id:'pdd',    name:'拼多多', tmpl:'https://mobile.yangkeduo.com/search_result.html?search_key={kw}'},
  ],
  jp:[
    {id:'amazonjp',   name:'Amazon',            tmpl:'https://www.amazon.co.jp/s?k={kw}'},
    {id:'rakuten',    name:'楽天市場',           tmpl:'https://search.rakuten.co.jp/search/mall/{kw}/'},
    {id:'rakutenseiyu',name:'楽天西友ネットスーパー', tmpl:'https://sm.rakuten.co.jp/search?keyword={kw}'},
  ],
};
function affCfg(){return (typeof window!=='undefined'&&window.AFFILIATE_CONFIG)||{};}
function currentMarket(){return state.market||(state.lang==='ja'?'jp':'cn');}
function setMarket(m){state.market=m;state.buyPlatform=null;saveState();renderShopping();}
function buyKeyword(n){return currentMarket()==='jp'?(ING_JA[n]||n):n;}
// 生成深链：自定义模板 > 平台专属联盟参数 > 普通搜索
function buyLink(platform,n){
  const cfg=affCfg();
  const kw=encodeURIComponent(buyKeyword(n));
  const custom=(cfg.CUSTOM_TEMPLATES||{})[platform.id];
  let url=(custom||platform.tmpl).replace('{kw}',kw);
  if(!custom){
    if(platform.id==='amazonjp'&&cfg.AMAZON_JP_TAG)url+='&tag='+encodeURIComponent(cfg.AMAZON_JP_TAG);
    if(platform.id==='rakuten'&&cfg.RAKUTEN_AFF_ID)url='https://hb.afl.rakuten.co.jp/hgc/'+encodeURIComponent(cfg.RAKUTEN_AFF_ID)+'/?pc='+encodeURIComponent(url);
  }
  if(custom&&custom.includes('{url}'))url=custom.replace('{url}',encodeURIComponent(platform.tmpl.replace('{kw}',kw))).replace('{kw}',kw);
  return url;
}
function trackBuyClick(pid){
  try{
    const k='mp_buy_clicks';
    const c=JSON.parse(localStorage.getItem(k)||'{}');
    c[pid]=(c[pid]||0)+1;
    localStorage.setItem(k,JSON.stringify(c));
  }catch(e){}
}
function openBuy(n){
  const plats=BUY_PLATFORMS[currentMarket()];
  const chosen=plats.find(p=>p.id===state.buyPlatform);
  if(!chosen){state.buyPicker=n;renderShopping();return;}
  trackBuyClick(chosen.id);
  if(typeof window!=='undefined'&&window.open)window.open(buyLink(chosen,n),'_blank','noopener');
}
function pickBuyPlatform(pid){
  state.buyPlatform=pid;saveState();
  const n=state.buyPicker;state.buyPicker=null;
  if(state.buyRun&&!state.buyRun.queue){startBuyQueue();return;}
  renderShopping();
  if(n)openBuy(n);
}
function cancelBuyPicker(){state.buyPicker=null;renderShopping();}
function changeBuyPlatform(){state.buyPlatform=null;state.buyPicker=null;saveState();renderShopping();}

// -- 采购模式（多选→逐个跳转）与比价 --
function unboughtList(){return shoppingList(currentWeekPlan(),state.fridge,state.purchased).filter(i=>!i.done);}
function enterBuyMode(){
  const sel={};unboughtList().forEach(i=>sel[i.n]=true);
  state.buyRun={sel,queue:null,idx:0};
  renderShopping();
}
function exitBuyMode(){state.buyRun=null;renderShopping();}
function buySelToggle(n){if(!state.buyRun)return;state.buyRun.sel[n]=!state.buyRun.sel[n];renderShopping();}
function buySelected(){return state.buyRun?Object.keys(state.buyRun.sel).filter(n=>state.buyRun.sel[n]):[];}
function startBuyQueue(){
  const q=buySelected();
  if(!q.length)return;
  if(!state.buyPlatform){state.buyPicker=q[0];renderShopping();return;}
  state.buyRun.queue=q;state.buyRun.idx=0;
  renderShopping();
}
function buyRunOpenCurrent(){
  const r=state.buyRun;if(!r||!r.queue)return;
  openBuy(r.queue[r.idx]);
  r.idx++;renderShopping();
}
function buyRunSkip(){const r=state.buyRun;if(!r||!r.queue)return;r.idx++;renderShopping();}
function buyRunMarkAll(){
  const r=state.buyRun;if(!r||!r.queue)return;
  r.queue.forEach(n=>{
    if(!state.purchased[n]){state.purchased[n]=true;if(cloud.on)db.purchase(n,true);}
  });
  state.buyRun=null;
  commit();
}
function copyShoppingList(){
  const items=state.buyRun?unboughtList().filter(i=>state.buyRun.sel[i.n]):unboughtList();
  const text=items.map(i=>`・${ingName(i.n)} ×${i.q}${unitName(i.u)}`).join('\n');
  const done=()=>toast(tr('copied'));
  try{
    if(typeof navigator!=='undefined'&&navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done,done);
    }else if(typeof document!=='undefined'&&document.execCommand){
      const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();
    }else done();
  }catch(e){done();}
  return text;
}
async function priceCheck(n){
  if(!state.priceData)state.priceData={};
  state.priceData[n]={loading:true};renderShopping();
  try{
    const res=await fetch('/api/price-check?kw='+encodeURIComponent(buyKeyword(n))+'&market='+currentMarket());
    const j=await res.json();
    if(!j||!Array.isArray(j.results))throw new Error('bad');
    state.priceData[n]={results:j.results,reason:j.reason||null};
  }catch(e){
    state.priceData[n]={results:[],reason:'error'};
  }
  renderShopping();
}
function priceRowsHtml(n){
  const pd=(state.priceData||{})[n];
  if(!pd)return '';
  if(pd.loading)return `<p class="muted" style="margin:4px 0 0 30px">${tr('comparing')}</p>`;
  if(pd.results&&pd.results.length){
    return pd.results.map((r,i)=>`<div class="row" style="margin-left:26px;padding:5px 0">
      <span style="font-size:12px;min-width:0" class="grow">${i===0?`<span class="tag green">${tr('compareBest')}</span> `:''}<b>¥${r.price.toLocaleString?r.price.toLocaleString():r.price}</b> · <span class="muted">${r.shop}</span><br><span class="muted" style="font-size:11px">${r.name.slice(0,34)}</span></span>
      <a class="btn ghost small" style="text-decoration:none" href="${r.url}" target="_blank" rel="noopener">${tr('compareGo')}</a></div>`).join('');
  }
  const plats=BUY_PLATFORMS[currentMarket()];
  return `<p class="muted" style="margin:4px 0 4px 30px">${tr('compareNone')}</p>
    <div class="flex" style="margin-left:30px;flex-wrap:wrap">${plats.map(p=>`<a class="btn ghost small" style="text-decoration:none" href="${buyLink(p,n)}" target="_blank" rel="noopener">${p.name}</a>`).join('')}</div>`;
}

// -- 购物清单页 --
function renderShopping(){
  const list=shoppingList(currentWeekPlan(),state.fridge,state.purchased);
  const done=list.filter(i=>i.done).length;
  const mkt=currentMarket();
  const plats=BUY_PLATFORMS[mkt];
  const chosen=plats.find(p=>p.id===state.buyPlatform);
  let html='';
  // 平台选择面板
  if(state.buyPicker){
    html+=`<div class="card" style="border-color:var(--accent)"><h3>${tr('buyPickTitle')}</h3>
      <p class="muted" style="margin-bottom:8px">${tr('buyPickSub')}</p>
      ${plats.map(p=>`<div class="row clickable" onclick="pickBuyPlatform('${p.id}')"><span><b style="font-size:14px">${p.name}</b></span><span class="muted">›</span></div>`).join('')}
      <p class="muted" style="margin-top:8px">${tr('buyDisclosure')}</p>
      <button class="btn ghost" style="width:100%;margin-top:8px" onclick="cancelBuyPicker()">${tr('back')}</button></div>`;
  }
  html+=`<div class="card" style="padding:10px 14px"><div class="flex" style="justify-content:space-between">
    <span class="muted">${tr('buyMarket')}:
      <span class="clickable ${mkt==='cn'?'':''}" style="${mkt==='cn'?'font-weight:700;color:var(--ink)':''}" onclick="setMarket('cn')">${tr('marketCn')}</span> /
      <span class="clickable" style="${mkt==='jp'?'font-weight:700;color:var(--ink)':''}" onclick="setMarket('jp')">${tr('marketJp')}</span></span>
    <span class="muted">${chosen?T[state.lang].buyCurrent(chosen.name)+' · ':''}${chosen?`<span class="clickable" style="text-decoration:underline" onclick="changeBuyPlatform()">${tr('buyChange')}</span>`:''}</span>
  </div></div>`;
  const unbought=list.filter(i=>!i.done);
  // ===== 采购模式面板 =====
  if(state.buyRun&&state.buyRun.queue){
    const r=state.buyRun;
    if(r.idx<r.queue.length){
      const n=r.queue[r.idx];
      const item=list.find(x=>x.n===n);
      html+=`<div class="card" style="border-color:var(--accent);text-align:center">
        <p class="muted">${T[state.lang].runProgress(r.idx+1,r.queue.length)}</p>
        <h3 style="margin:8px 0">${ingName(n)} ${item?`<span class="muted" style="font-weight:400">×${item.q}${unitName(item.u)}</span>`:''}</h3>
        <button class="btn" style="width:100%" onclick="buyRunOpenCurrent()">${T[state.lang].runOpenBtn(chosen?chosen.name:'',ingName(n))}</button>
        <p class="muted clickable" style="margin-top:10px;text-decoration:underline" onclick="buyRunSkip()">${tr('runSkip')}</p>
        <p class="muted clickable" style="margin-top:6px" onclick="exitBuyMode()">${tr('exitBuyMode')}</p></div>`;
    }else{
      html+=`<div class="card" style="text-align:center">
        <h3>${tr('runDoneTitle')}</h3><p class="muted" style="margin:8px 0">${tr('runDoneSub')}</p>
        <button class="btn" style="width:100%" onclick="buyRunMarkAll()">${tr('runMarkAll')}</button>
        <p class="muted clickable" style="margin-top:10px;text-decoration:underline" onclick="exitBuyMode()">${tr('runBackList')}</p></div>`;
    }
  }else if(state.buyRun){
    const selN=buySelected().length;
    html+=`<div class="card" style="border-color:var(--accent)"><h3>${T[state.lang].buyMode(unbought.length)}</h3>`;
    unbought.forEach(i=>{
      const on=!!state.buyRun.sel[i.n];
      html+=`<div class="row">
        <span class="flex"><span class="check ${on?'on':''}" onclick="buySelToggle('${i.n}')">${on?'✓':''}</span>
        <span>${ingName(i.n)} <span class="muted">×${i.q}${unitName(i.u)}</span></span></span>
        <button class="btn ghost small" onclick="priceCheck('${i.n}')">${tr('compare')}</button></div>
        ${priceRowsHtml(i.n)}`;
    });
    html+=`<div class="flex" style="margin-top:12px">
      <button class="btn grow" onclick="startBuyQueue()">${tr('buyStartRun')}（${selN}）</button>
      <button class="btn ghost" onclick="copyShoppingList()">${tr('copyList')}</button></div>
      <p class="muted clickable" style="text-align:center;margin-top:8px" onclick="exitBuyMode()">${tr('exitBuyMode')}</p>
      <p class="muted" style="margin-top:6px">${tr('buyDisclosure')}</p></div>`;
  }
  // ===== 常规清单 =====
  if(!state.buyRun){
    html+=`<div class="card"><h3>${tr('toBuy')}（${done}/${list.length} ${tr('bought')}）</h3>
      <p class="muted" style="margin-bottom:8px">${tr('autoGen')}</p>`;
    if(list.length===0) html+=`<div class="empty">${tr('nothingToBuy')}</div>`;
    if(unbought.length>1)html+=`<button class="btn ghost" style="width:100%;margin-bottom:8px" onclick="enterBuyMode()">${T[state.lang].buyMode(unbought.length)}</button>`;
    list.forEach(i=>{
      html+=`<div class="row">
        <span class="flex"><span class="check ${i.done?'on':''}" onclick="togglePurchase('${i.n}')">${i.done?'✓':''}</span>
        <span class="${i.done?'strike':''}">${ingName(i.n)}</span></span>
        <span class="flex"><span class="muted">${i.q}${unitName(i.u)}</span>
        ${i.done?'':`<button class="btn ghost small" onclick="openBuy('${i.n}')">🛒 ${tr('buyGo')}</button>`}</span></div>`;
    });
    html+=`<p class="muted" style="margin-top:8px">${tr('buyDisclosure')}</p></div>`;
  }
  if(done>0) html+=`<div style="text-align:center"><button class="btn ghost" onclick="stockPurchased()">${T[state.lang].putInFridge(done)}</button></div>`;
  $('page-shopping').innerHTML=html;
}
function togglePurchase(n){
  state.purchased[n]=!state.purchased[n];
  if(cloud.on)db.purchase(n,!!state.purchased[n]);
  commit();
}
function stockPurchased(){
  const list=shoppingList(currentWeekPlan(),state.fridge,{});
  const ch={updates:[],inserts:[],unmark:[]};
  list.forEach(i=>{
    if(state.purchased[i.n]){
      const exist=state.fridge.find(f=>f.n===i.n&&f.u===i.u);
      if(exist){
        exist.q+=i.q;
        if(exist._id)ch.updates.push({id:exist._id,q:exist.q});
        else ch.inserts.push({n:i.n,q:i.q,u:i.u});
      }else{
        state.fridge.push({n:i.n,q:i.q,u:i.u});
        ch.inserts.push({n:i.n,q:i.q,u:i.u});
      }
      delete state.purchased[i.n];
      ch.unmark.push(i.n);
    }
  });
  if(cloud.on)db.stock(ch);
  commit(); toast(tr('stockedGo'));
}

// -- 推荐页 --
function renderSuggest(){
  const recs=recommend(state.fridge,state.purchased);
  const ready=recs.filter(r=>r.missing.length===0);
  const almost=recs.filter(r=>r.missing.length>0&&r.missing.length<=2);

// 前端压缩到1024px（控制token成本）
function compressImage(file){
  return new Promise((resolve,reject)=>{
    if(typeof FileReader==='undefined'){reject(new Error('no FileReader'));return;}
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1024;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){const k=MAX/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k);}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg',0.8));
      };
      img.onerror=reject;img.src=fr.result;
    };
    fr.onerror=reject;fr.readAsDataURL(file);
  });
}
async function onZoneFiles(zone,input){
  const files=Array.from(input.files||[]).slice(0,4);
  for(const f of files){
    try{scanState.zones[zone].push(await compressImage(f));}catch(e){}
  }
  input.value='';
  renderScan();
}
async function startScan(useDemo){
  if(scanState.busy)return;
  if(useDemo){ingestScanItems(demoScanItems());return;}
  if(scanPhotoCount()===0){toast(tr('scanStartNeed'));return;}
  scanState.busy=true;scanState.step='scanning';scanState.log=[];renderScan();
  const collected=[];
  try{
    for(const z of SCAN_ZONES){
      const imgs=scanState.zones[z];
      if(!imgs.length)continue;
      const res=await fetch('/api/scan-fridge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({images:imgs,zone:z})});
      let j=null;try{j=await res.json();}catch(_){j={};}
      if(!res.ok){
        const detail=(j&&(j.detail||j.error))||('HTTP '+res.status);
        throw new Error(detail);
      }
      (j.items||[]).forEach(it=>collected.push(it));
      scanState.log.push(T[state.lang].scanZoneDone(zoneName(z),(j.items||[]).length));
      renderScan();
    }
    scanState.busy=false;
    ingestScanItems(collected);
  }catch(e){
    scanState.busy=false;scanState.step='capture';
    scanState.lastError=String(e&&e.message||e).slice(0,140);
    renderScan();
    toast(tr('scanFail'));
  }
}

// 识别结果 → 归一 → 去重合并 → 标注待确认
function ingestScanItems(raw){
  const merged=[];
  (raw||[]).forEach(r=>{
    const n=canonIng(r.name)||'???';
    const q=Math.max(0.1,Number(r.qty)||1);
    const u=normUnit(String(r.unit||'份').trim());
    const cat=CATS.includes(r.category)?r.category:'其他';
    const conf=r.confidence!=null?Number(r.confidence):0.9;
    const ex=n!=='???'&&merged.find(m=>m.n===n&&m.u===u);
    if(ex){ex.q+=q;ex.conf=Math.min(ex.conf,conf);}
    else merged.push({id:'sc'+(scanUid++),n,q,u,cat,conf,removed:false});
  });
  merged.forEach(m=>{m.review=m.conf<0.7||m.n==='???';});
  scanState.items=merged;
  scanState.step='result';
  renderScan();
}

function scanConfirm(){
  const active=scanActive();
  const review=active.filter(i=>i.review).length;
  if(review){toast(T[state.lang].warnReview(review));return;}
  if(!active.length){toast(tr('scanStartNeed'));return;}
  if(scanState.mode==='merge'){
    const ch={updates:[],inserts:[],unmark:[]};
    let nw=0;
    active.forEach(it=>{
      const ex=state.fridge.find(f=>f.n===it.n&&f.u===it.u);
      if(ex){
        ex.q+=it.q;
        if(ex._id)ch.updates.push({id:ex._id,q:ex.q});else ch.inserts.push({n:it.n,q:it.q,u:it.u});
      }else{
        state.fridge.push({n:it.n,q:it.q,u:it.u});
        ch.inserts.push({n:it.n,q:it.q,u:it.u});nw++;
      }
    });
    if(cloud.on)db.stock(ch);
    scanState.doneMsg=T[state.lang].doneMerge(active.length,nw);
    scanState.undo=null;
  }else{
    scanState.undo=state.fridge.map(f=>({n:f.n,q:f.q,u:f.u}));
    state.fridge=active.map(it=>({n:it.n,q:it.q,u:it.u}));
    if(cloud.on)db.fridgeReplace(state.fridge);
    scanState.doneMsg=T[state.lang].doneOver(active.length);
  }
  commit();
  scanState.step='done';renderScan();
}

    scanState.items.forEach(it=>{(groups[it.cat]=groups[it.cat]||[]).push(it);});
    Object.keys(groups).forEach(cat=>{
      body+=`<p class="muted" style="margin:10px 4px 4px;font-weight:600">${CAT_EMO[cat]} ${catName(cat)}</p>`;
      groups[cat].forEach(it=>{
        const st=scanStatusOf(it);
        let badge='';
        if(it.review)badge=`<span class="tag amber">${tr('badgeRev')}</span>`;
        else if(st.badge==='add')badge=`<span class="tag green">${T[state.lang].badgeAdd(it.q)}</span>`;
        else if(st.badge==='new')badge=`<span class="tag blue">${tr('badgeNew')}</span>`;
        else badge=`<span class="tag">${tr('badgeOver')}</span>`;
        const exNote=(scanState.mode==='merge'&&st.ex)?T[state.lang].exNote(st.ex.q+unitName(st.ex.u),(st.ex.q+it.q)+unitName(it.u)):'';
        body+=`<div class="card scan-item ${it.removed?'removed':''} ${it.review?'review':''}" style="padding:10px 12px;margin-bottom:8px">
          <div class="flex">
            <span class="grow" style="min-width:0">
              <b style="font-size:14px" class="${it.review?'clickable':''}" ${it.review?`onclick="scanEdit('${it.id}')" style="font-size:14px;color:var(--amber);text-decoration:underline"`:''}>${it.n==='???'?'❓ '+tr('tapConfirm'):ingName(it.n)}</b> ${badge}<br>
              <span class="muted">${it.conf>=0.7?tr('confHi'):tr('confLo')}${exNote?' · '+exNote:''}</span></span>
            <span class="stepper"><button onclick="scanStep('${it.id}',-1)">－</button><span>${it.q}</span><button onclick="scanStep('${it.id}',1)">＋</button></span>
            <button class="btn ghost small" onclick="scanToggle('${it.id}')">${it.removed?'↺':'✕'}</button>
          </div></div>`;
      });
    });
    body+=`<div class="photo-hint" onclick="scanOpenAdd()">${tr('scanManualAdd')}</div>`;
    const active=scanActive(), review=active.filter(i=>i.review).length;
    body+=`<div class="card">`;
    if(scanState.mode==='merge'){
      const add=active.filter(i=>state.fridge.find(f=>f.n===i.n&&f.u===i.u)).length;
      body+=`<div class="row"><span class="muted">${tr('sumActive')}</span><b>${active.length} ${tr('items')}</b></div>
        <div class="row"><span class="muted">${tr('sumAdd')}</span><b>${add} ${tr('items')}</b></div>
        <div class="row"><span class="muted">${tr('sumNew')}</span><b>${active.length-add} ${tr('items')}</b></div>`;
    }else{
      body+=`<div class="row"><span class="muted">${tr('sumReplace')}</span><b>${active.length} ${tr('items')}</b></div>
        <div class="row"><span class="muted">${tr('sumRemoved')}</span><b>${removedOld.length} ${tr('items')}</b></div>`;
    }
    if(review)body+=`<div class="scan-warn">${T[state.lang].warnReview(review)}</div>`;
    body+=`</div>
      <button class="btn" style="width:100%" onclick="scanConfirm()">${review?T[state.lang].confirmStockRev(review)+' · ':''}${tr('confirmStock')}</button>`;
  }else{ // done
    body=`<div class="card" style="text-align:center;padding:26px 14px">
      <div style="font-size:48px">✅</div>
      <h3 style="margin:10px 0 6px">${tr('doneTitle')}</h3>
      <p class="muted">${scanState.doneMsg}</p>
      ${scanState.undo?`<button class="btn ghost" style="margin-top:10px" onclick="scanUndo()">${tr('undoOver')}</button>`:''}</div>
      <div class="card clickable" onclick="scanGoto('suggest')"><div class="flex"><span style="font-size:22px">🍳</span>
        <span class="grow"><b style="font-size:14px">${tr('nudgeSuggest')}</b><br><span class="muted">${tr('nudgeSuggestSub')}</span></span></div></div>
      <div class="card clickable" onclick="scanGoto('shopping')"><div class="flex"><span style="font-size:22px">🛒</span>
        <span class="grow"><b style="font-size:14px">${tr('nudgeShopping')}</b><br><span class="muted">${tr('nudgeShoppingSub')}</span></span></div></div>
      <button class="btn ghost" style="width:100%" onclick="openScan()">${tr('scanAgain')}</button>`;
  }
  el.innerHTML=`<div class="detail-inner">
    <div class="flex" style="justify-content:space-between;margin-bottom:4px">
      <button class="detail-back" onclick="closeScan()">${tr('back')}</button>
      <button class="detail-back" onclick="toggleLang()">${tr('langBtn')}</button>
    </div>${body}</div>`;
}

// -- 选菜器（搜索+推荐，应对300+菜库） --
const picker={open:false,day:null,meal:null,kw:'',cuisine:'全部'};
function openPicker(day,meal){
  picker.open=true;picker.day=day;picker.meal=meal;picker.kw='';picker.cuisine='全部';
  renderPicker();$('picker').classList.add('open');
}
function closePicker(){picker.open=false;$('picker').classList.remove('open');renderPlan();}
function pickerSetKw(){picker.kw=$('picker-kw').value.trim().toLowerCase();renderPickerList();}
function pickerSetCuisine(c){
  picker.cuisine=c;
  renderPicker();
  const el=$('picker-kw');if(el)el.value=picker.kw;
  renderPickerList();
}
function pickerMatch(d){
  if(picker.cuisine!=='全部'&&d.cuisine!==picker.cuisine)return false;
  if(!picker.kw)return true;
  const kw=picker.kw;
  if(d.name.toLowerCase().includes(kw))return true;
  if((d.ja||'').toLowerCase().includes(kw))return true;
  return d.ingredients.some(i=>i.n.includes(kw)||(ING_JA[i.n]||'').toLowerCase().includes(kw));
}
function pickerAdd(id){
  addDish(picker.day,picker.meal,id);
  renderPickerList();
}
function pickerRowHtml(d,ready){
  const inPlan=viewedPlan()[picker.day][picker.meal].includes(d.id);
  return `<div class="row">
    <span class="clickable grow" style="min-width:0" onclick="showDish('${d.id}')">${d.emoji} <b style="font-size:13px">${dishName(d)}</b>
      <span class="tag">${cuisineName(d.cuisine)}</span>${ready?`<span class="tag green">${tr('pickerReadyTag')}</span>`:''}
      <span class="muted">★${avgRating(d.id).toFixed(1)}</span></span>
    ${inPlan?`<span class="muted">${tr('pickerAdded')}</span>`:`<button class="btn small" onclick="pickerAdd('${d.id}')">${tr('add')}</button>`}</div>`;
}
function renderPickerList(){
  const el=$('picker-list');if(!el)return;
  let html='';
  const recs=recommend(state.fridge,state.purchased);
  if(!picker.kw&&picker.cuisine==='全部'){
    html+=`<p class="muted" style="margin:8px 4px 4px;font-weight:600">${tr('pickerRec')}</p>`;
    recs.slice(0,8).forEach(r=>{html+=pickerRowHtml(r.dish,r.missing.length===0);});
  }
  html+=`<p class="muted" style="margin:12px 4px 4px;font-weight:600">${tr('pickerAll')}</p>`;
  const readyIds=new Set(recs.filter(r=>r.missing.length===0).map(r=>r.dish.id));
  const matched=allDishes().filter(d=>pickerMatch(d));
  if(!matched.length)html+=`<div class="empty">${tr('pickerNone')}</div>`;
  matched.slice(0,60).forEach(d=>{html+=pickerRowHtml(d,readyIds.has(d.id));});
  if(matched.length>60)html+=`<p class="muted" style="text-align:center">…${matched.length-60}</p>`;
  el.innerHTML=html;
}
function renderPicker(){
  const cuisines=['全部','中餐','日餐','韩餐','西餐','其他'];
  $('picker').innerHTML=`<div class="detail-inner">
    <div class="flex" style="justify-content:space-between;margin-bottom:4px">
      <button class="detail-back" onclick="closePicker()">${tr('back')}</button>
      <button class="detail-back" onclick="toggleLang()">${tr('langBtn')}</button>
    </div>
    <div class="card"><h3>${tr('pickerTitle')} · ${dayName(picker.day)} ${mealName(picker.meal)}</h3>
      <input type="text" id="picker-kw" placeholder="${tr('pickerSearchPh')}" style="width:100%;margin:8px 0" oninput="pickerSetKw()">
      <div class="cuisine-filter">${cuisines.map(c=>`<button class="${picker.cuisine===c?'active':''}" onclick="pickerSetCuisine('${c}')">${cuisineName(c)}</button>`).join('')}</div>
      <div id="picker-list"></div></div></div>`;
  renderPickerList();
}

// -- 菜品详情页 --
function showDish(id){ state.detailDish=id; renderDetail(); }
function closeDish(){ state.detailDish=null; $('detail').classList.remove('open'); }
function renderDetail(){
  const el=$('detail');
  if(!state.detailDish){ el.classList.remove('open'); return; }
  const d=getDish(state.detailDish);
  if(!d){ closeDish(); return; }
  const stock=fridgeMap(state.fridge);
  const steps=state.lang==='ja'?(d.stepsJa||d.steps):d.steps;
  const refZhUrl='https://www.xiachufang.com/search/?keyword='+encodeURIComponent(d.name);
  const refJaUrl='https://cookpad.com/jp/search/'+encodeURIComponent(d.ja||d.name);
  let html=`<div class="detail-inner">
    <button class="detail-back" onclick="closeDish()">${tr('back')}</button>
    <div class="detail-head"><div class="big">${d.emoji}</div><h2>${dishName(d)}</h2>
      <div style="margin-top:6px"><span class="tag">${cuisineName(d.cuisine)}</span>
      ${isReadyToCook(d,state.fridge,state.purchased)?`<span class="tag green">${tr('ready')}</span>`:`<span class="tag amber">${T[state.lang].missN(missingFor(d,state.fridge,state.purchased).length)}</span>`}
      <span class="muted" style="margin-left:6px">★${avgRating(d.id).toFixed(1)}</span></div></div>
    <div class="card"><h3>${tr('ingList')}</h3>`;
  d.ingredients.forEach(i=>{
    const enough=(stock[i.n]||0)>=i.q-1e-9||state.purchased[i.n];
    html+=`<div class="row"><span>${ingName(i.n)}</span>
      <span class="flex"><span class="muted">${i.q}${unitName(i.u)}</span>
      ${enough?`<span class="tag green">${tr('haveIt')}</span>`:`<span class="tag amber">${tr('lack')}</span>`}</span></div>`;
  });
  html+=`<p class="muted" style="margin-top:8px">${tr('seasoningNote')}</p></div>
    <div class="card"><h3>${tr('steps')}</h3><ol class="steps-ol">${(steps||[]).map(s=>`<li>${s}</li>`).join('')}</ol></div>
    <div class="card"><h3>${tr('refTitle')}</h3>
      ${d.custom&&d.ref?`<a class="ref-link" href="${d.ref}" target="_blank" rel="noopener">${tr('refSource')}</a>`:''}
      <a class="ref-link" href="${refZhUrl}" target="_blank" rel="noopener">🇨🇳 ${tr('refZh')}</a>
      <a class="ref-link" href="${refJaUrl}" target="_blank" rel="noopener">🇯🇵 ${tr('refJa')}</a></div>
    <div class="card">
      <div class="row"><span class="muted">${tr('myRating')}</span>${starHtml(d.id,'me',state.user==='me')}</div>
      <div class="row"><span class="muted">${tr('taRating')}</span>${starHtml(d.id,'partner',state.user==='partner')}</div>
    </div>
    ${d.custom?`<div style="text-align:center"><button class="btn ghost" onclick="deleteCustomDish('${d.id}')">${tr('delDish')}</button></div>`:''}</div>`;
  el.innerHTML=html;
  el.classList.add('open');
}

function renderAll(){renderHeader();renderPlan();renderDishes();renderFridge();renderShopping();renderSuggest();renderDetail();}

// ---- 启动 ----
loadState();
if(CLOUD_ON){emptyLocalData();}
else{initSync();}
initCloud();
renderAll();
</script>
</body>
